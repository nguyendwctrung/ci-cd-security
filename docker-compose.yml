version: "3.8"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: pokemap-server
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=10000
    ports:
      - "10000:10000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:10000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_TINY_MCE=${VITE_TINY_MCE:-}
    container_name: pokemap-client
    ports:
      - "3800:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    driver: bridge