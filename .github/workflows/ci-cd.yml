name: CI/CD Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  NODE_VERSION: "20"

jobs:
  # STAGE 1: BUILD & LINT
  build-and-lint:
    name: Build and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Server Dependencies
        run: |
          cd server
          npm ci

      - name: Install Client Dependencies
        run: |
          cd client
          npm ci

      - name: Install & Lint Server
        run: |
          cd server
          npm ci
          npm run lint || true

      - name: Install & Lint Client
        run: |
          cd client
          npm ci
          npm run lint || true

  # STAGE 2: SECURITY SCANS (SAST & SECRETS)
  security-scans:
    name: Security Scans
    needs: build-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Scan Secret (Gitleaks)
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Scan Source Code (Semgrep)
      - name: Semgrep Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/react
            p/node

      # Scan Dependencies (Trivy FS)
      - name: Trivy Dependency Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'table'

  # STAGE 3: DOCKER BUILD & SCAN
  docker-security:
    name: Docker Build and Scan
    needs: security-scans
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Server Image
        run: docker build -t pokemap-server:test ./server

      - name: Scan Server Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'pokemap-server:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1' # Fail if vulnerabilities found

  # STAGE 4: SUMMARY
  summary:
    name: Pipeline Summary
    needs: [security-scans, docker-security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report Status
        run: echo "Pipeline finished. Check Security tab for detailed reports."